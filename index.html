<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="image_41.png">
    <link rel="icon" href="image_41.png">
    <title>Mark It - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff; /* 憲法に基づき#fff */
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --ghost: #aaa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { text-align: center; }
        h1 { font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .description { font-size: 13px; color: #666; margin-top: 5px; }

        /* 複数行対応の入力エリア */
        .input-wrapper {
            width: 100%;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 15px;
            padding-right: 50px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            font-size: 16px;
            font-weight: 700;
            color: var(--main) !important;
            outline: none;
            resize: none;
            /* iOS対策 */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #ccc; -webkit-text-fill-color: #ccc; }

        .clr-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 11px;
            font-weight: bold;
            color: var(--ghost);
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 4px 8px;
            cursor: pointer;
            display: none;
        }

        .interaction-box {
            width: 100%;
            min-height: 220px;
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
        }

        #drop-zone { text-align: center; padding: 20px; }
        .drop-text { font-size: 14px; font-weight: 700; color: #bbb; }

        #preview-canvas { max-width: 100%; height: auto; display: none; }
        #file-input { display: none; }

        .action-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            display: none;
            margin-top: 10px;
        }
        .action-btn.show { display: block; }
        .action-btn:active { transform: scale(0.98); }

        .kofi-btn {
            display: inline-block; background: var(--main); color: #fff;
            padding: 12px 25px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 30px;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 11px;
            color: #aaa;
            line-height: 1.8;
        }

        /* モーダル略 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); max-width: 340px; width: 90%; position: relative; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mark It</h1>
        <div class="description">Watermark Inserter (Multi-line)</div>
    </header>

    <div class="input-wrapper">
        <textarea id="signature-input" placeholder="Your signature&#10;(Supports multi-line)"></textarea>
        <button id="clr-btn" class="clr-btn">clr</button>
    </div>

    <div class="interaction-box" id="interaction-box" onclick="document.getElementById('file-input').click()">
        <div id="drop-zone">
            <div class="drop-text">Drop image or Tap to select</div>
        </div>
        <canvas id="preview-canvas"></canvas>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <button class="action-btn" id="download-btn" onclick="downloadImage()">DOWNLOAD</button>

    <div style="text-align:center;">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<script>
    const signatureInput = document.getElementById('signature-input');
    const clrBtn = document.getElementById('clr-btn');
    const interactionBox = document.getElementById('interaction-box');
    const fileInput = document.getElementById('file-input');
    const downloadBtn = document.getElementById('download-btn');
    const previewCanvas = document.getElementById('preview-canvas');
    const ctx = previewCanvas.getContext('2d');

    let currentImage = null;

    // Load initial data
    const saved = localStorage.getItem('markItSignature');
    if (saved) {
        signatureInput.value = saved;
        clrBtn.style.display = 'block';
    }

    signatureInput.addEventListener('input', () => {
        const text = signatureInput.value;
        localStorage.setItem('markItSignature', text);
        clrBtn.style.display = text ? 'block' : 'none';
        if(currentImage) processImage(currentImage);
    });

    clrBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        signatureInput.value = '';
        localStorage.removeItem('markItSignature');
        clrBtn.style.display = 'none';
        if(currentImage) processImage(currentImage);
    });

    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => { currentImage = img; processImage(img); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function processImage(img) {
        const text = signatureInput.value;
        previewCanvas.width = img.width;
        previewCanvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        if (!text) {
            updateUI();
            return;
        }

        // サイズアップ: width / 25
        const fontSize = Math.max(24, Math.round(img.width / 25));
        ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'right';

        const lines = text.split('\n').reverse(); // 下から順に描画
        const padding = fontSize;
        const lineHeight = fontSize * 1.2;

        ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
        ctx.shadowBlur = fontSize / 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = 'rgba(255, 255, 255, 1.0)';

        lines.forEach((line, index) => {
            const y = img.height - padding - (index * lineHeight);
            ctx.fillText(line, img.width - padding, y);
        });

        // Reset shadow for canvas purity
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

        updateUI();
    }

    function updateUI() {
        document.getElementById('drop-zone').style.display = 'none';
        previewCanvas.style.display = 'block';
        downloadBtn.classList.add('show');
    }

    function downloadImage() {
        const dataUrl = previewCanvas.toDataURL('image/jpeg', 0.95);
        const link = document.createElement('a');
        link.download = `marked_${Date.now()}.jpg`;
        link.href = dataUrl;
        link.click();
    }
</script>

</body>
</html>
